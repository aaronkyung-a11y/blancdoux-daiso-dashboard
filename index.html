@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

:root {
  --bg: #0d1117;
  --card: #161b22;
  --card-border: #21262d;
  --text: #e6edf3;
  --text-muted: #8b949e;
  --accent: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d29922;
  --purple: #bc8cff;
  --pink: #f778ba;
  --cyan: #39d2c0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  padding: 20px;
}

.container { max-width: 1400px; margin: 0 auto; }

/* Header */
.header {
  text-align: center;
  padding: 40px 20px 30px;
  border-bottom: 1px solid var(--card-border);
  margin-bottom: 30px;
}
.header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header .subtitle { color: var(--text-muted); font-size: 0.95rem; }
.header .date-badge {
  display: inline-block;
  background: var(--card);
  border: 1px solid var(--card-border);
  padding: 4px 16px;
  border-radius: 20px;
  font-size: 0.85rem;
  color: var(--accent);
  margin-top: 10px;
}

/* Section titles */
.section-title {
  font-size: 1.3rem;
  font-weight: 700;
  margin: 40px 0 20px;
  padding-left: 14px;
  border-left: 4px solid var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .emoji { font-size: 1.4rem; }

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--accent); }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }

/* Hero KPI */
.hero {
  background: linear-gradient(135deg, #161b22 0%, #1a1f2e 100%);
  border: 2px solid var(--card-border);
  border-radius: 20px;
  padding: 50px 30px;
  text-align: center;
  margin-bottom: 30px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(88,166,255,0.03) 0%, transparent 70%);
}
.hero-label {
  font-size: 1rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 8px;
}
.hero-target-label { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 4px; }
.hero-target {
  font-size: 3.5rem;
  font-weight: 900;
  color: var(--text);
  margin-bottom: 20px;
  letter-spacing: -1px;
}
.hero-vs { font-size: 1.2rem; color: var(--text-muted); margin: 16px 0 4px; }
.hero-actual-label { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 4px; }
.hero-actual {
  font-size: 4.5rem;
  font-weight: 900;
  margin-bottom: 10px;
  letter-spacing: -2px;
}
.hero-rate {
  font-size: 3rem;
  font-weight: 900;
  margin-top: 10px;
}
.hero-rate-label { font-size: 1rem; color: var(--text-muted); margin-bottom: 4px; }
.status-achieved { color: var(--green); }
.status-missed { color: var(--red); }
.status-border-achieved { border-color: var(--green) !important; }
.status-border-missed { border-color: var(--red) !important; }

/* KPI mini cards */
.kpi-card {
  text-align: center;
  padding: 24px 16px;
}
.kpi-value {
  font-size: 2.2rem;
  font-weight: 900;
  margin-bottom: 4px;
}
.kpi-label {
  font-size: 0.85rem;
  color: var(--text-muted);
}
.kpi-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
}

/* Bar chart */
.bar-chart { padding: 10px 0; }
.bar-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
  gap: 12px;
}
.bar-label {
  min-width: 100px;
  font-size: 0.85rem;
  text-align: right;
  color: var(--text-muted);
}
.bar-track {
  flex: 1;
  height: 28px;
  background: rgba(255,255,255,0.05);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding-left: 10px;
  font-size: 0.8rem;
  font-weight: 700;
  color: #fff;
  transition: width 0.6s ease;
  min-width: fit-content;
}
.bar-value {
  min-width: 70px;
  text-align: right;
  font-size: 0.85rem;
  font-weight: 700;
}

/* Comparison highlight */
.comparison-box {
  background: rgba(88,166,255,0.08);
  border: 1px solid rgba(88,166,255,0.2);
  border-radius: 12px;
  padding: 24px;
  text-align: center;
  margin: 16px 0;
}
.comparison-big {
  font-size: 4rem;
  font-weight: 900;
  color: var(--green);
  line-height: 1;
}
.comparison-label {
  font-size: 1rem;
  color: var(--text-muted);
  margin-top: 8px;
}
.comparison-detail {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 16px;
  flex-wrap: wrap;
}
.comparison-item { text-align: center; }
.comparison-item .val { font-size: 1.4rem; font-weight: 700; }
.comparison-item .lbl { font-size: 0.8rem; color: var(--text-muted); }

.matrix-card {
  padding: 20px;
  border-left: 4px solid var(--accent);
}
.matrix-card h4 {
  font-size: 1.1rem;
  margin-bottom: 8px;
  color: var(--accent);
}
.matrix-card .insight {
  font-size: 0.9rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.matrix-card .highlight {
  font-size: 1.6rem;
  font-weight: 900;
  margin: 8px 0;
}
.matrix-card.green-border { border-left-color: var(--green); }
.matrix-card.purple-border { border-left-color: var(--purple); }
.matrix-card.orange-border { border-left-color: var(--orange); }

/* Platform cards */
.platform-stat {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 8px;
}
.platform-stat .big { font-size: 2rem; font-weight: 900; }
.platform-stat .unit { font-size: 0.9rem; color: var(--text-muted); }

/* Influencer table */
.inf-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
.inf-table th {
  text-align: left;
  padding: 10px 12px;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--card-border);
}
.inf-table td {

  font-size: 0.85rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);

.inf-table tr:hover { background: rgba(255,255,255,0.03); }
.inf-table a {
  color: var(--accent);
  text-decoration: none;
}
.inf-table a:hover { text-decoration: underline; }

.tag {

.tag-insta { background: rgba(247,120,186,0.15); color: var(--pink); }

.opinion-segment {

  padding: 20px;
  border-radius: 12px;
  text-align: center;

.opinion-segment.secondary {

.opinion-desc { font-size: 0.9rem; color: var(--text-muted); margin-top: 4px; }

.roadmap { position: relative; padding-left: 30px; }
.roadmap::before {
  content: '';
  position: absolute;
  left: 12px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--card-border);

.roadmap-item {
  position: relative;
  margin-bottom: 24px;
  padding: 16px 20px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 12px;

.roadmap-item::before {
  content: '';
  position: absolute;
  left: -24px;
  top: 22px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);

.roadmap-item.phase-2::before { background: var(--purple); }
.roadmap-item.phase-3::before { background: var(--green); }
.roadmap-phase {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 4px;

.roadmap-item.phase-2 .roadmap-phase { color: var(--purple); }
.roadmap-item.phase-3 .roadmap-phase { color: var(--green); }
.roadmap-title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
.roadmap-desc { font-size: 0.85rem; color: var(--text-muted); }

.verified-card {

  justify-content: space-between;
  align-items: center;

.verified-info { flex: 1; }
.verified-name { font-weight: 700; font-size: 0.95rem; }
.verified-handle { font-size: 0.8rem; color: var(--accent); }
.verified-stats { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

  font-weight: 900;
  color: var(--green);
  text-align: right;

.verified-views-label { font-size: 0.7rem; color: var(--text-muted); }

/* Progress bar */
.progress-bar {

  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;

.progress-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;

/* Footer */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 0.8rem;
  border-top: 1px solid var(--card-border);
  margin-top: 40px;

/* Responsive */
@media (max-width: 768px) {
  body { padding: 10px; }
  .hero-target { font-size: 2.2rem; }
  .hero-actual { font-size: 3rem; }
  .hero-rate { font-size: 2rem; }
  .kpi-value { font-size: 1.6rem; }
  .comparison-big { font-size: 2.5rem; }
  .section-title { font-size: 1.1rem; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .bar-label { min-width: 70px; font-size: 0.75rem; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

/* Pulse animation for hero */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
.pulse { animation: pulse 2s ease-in-out infinite; }

// ============================================================
function formatNumber(n) {
  if (n >= 10000) return (n / 10000).toFixed(1).replace(/\.0$/, '') + '만';
  return n.toLocaleString('ko-KR');
}

function formatCurrency(n) {
  return n.toLocaleString('ko-KR') + '원';
}

function getAchievementRate(actual, target) {
  return ((actual / target) * 100).toFixed(1);
}

function isAchieved(actual, target) {
  return actual >= target;
}
